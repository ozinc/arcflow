name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API (optional)
      description: If you have a specific API in mind, sketch it here
      render: typescript

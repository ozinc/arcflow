# Public PyPI publish for the `oz-arcflow` Python wheel.
#
# This workflow lives in ozinc/arcflow (public) for supply-chain audit
# transparency: anyone can read the run logs and verify how a wheel was
# built. Engine Rust source is checked out from ozinc/arcflow-core
# (private) via ARCFLOW_CORE_RO_PAT during the run.
#
# PyPI distribution name:  oz-arcflow  (registered by operator on PyPI)
# PyPI import name:        arcflow     (unchanged — package dir under src/)
#
# Operator setup (one-time):
#   1. PyPI Trusted Publisher already registered:
#        repo=ozinc/arcflow, workflow=publish-python.yml, environment=pypi
#   2. Provision ARCFLOW_CORE_RO_PAT in this repo's secrets — fine-grained
#      PAT, Contents: Read on ozinc/arcflow-core only, ≥ 90 day expiry.
#   3. The `pypi` GitHub Environment exists in this repo (created via gh api).
#   4. Engine-side: arcflow-core/python/pyproject.toml must have
#        name = "oz-arcflow"
#      and the package directory under src/ stays as `arcflow/`.
#
# Trigger: GitHub release published. Re-run via workflow_dispatch.
#
# DO NOT rename this file or the `pypi` environment without first updating
# the PyPI Trusted Publisher entry to match. PyPI fails any mismatch silently
# with `invalid-publisher`; edit the publisher entry, do not delete-and-recreate.

name: publish-python

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (defaults to engine RELEASE-MATRIX.toml engine.version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      platform: macosx_11_0_arm64,    cibw: "*-macosx_arm64" }
          - { os: macos-13,      platform: macosx_11_0_x86_64,   cibw: "*-macosx_x86_64" }
          - { os: ubuntu-latest, platform: linux_x86_64_gnu,     cibw: "*-manylinux_x86_64" }
          - { os: ubuntu-latest, platform: linux_x86_64_musl,    cibw: "*-musllinux_x86_64" }
          - { os: ubuntu-latest, platform: linux_aarch64_gnu,    cibw: "*-manylinux_aarch64" }
          - { os: ubuntu-latest, platform: linux_aarch64_musl,   cibw: "*-musllinux_aarch64" }
    steps:
      - name: Verify ARCFLOW_CORE_RO_PAT is set
        if: ${{ secrets.ARCFLOW_CORE_RO_PAT == '' }}
        run: |
          echo "::error::ARCFLOW_CORE_RO_PAT is not set. Provision a fine-grained PAT scoped to ozinc/arcflow-core (Contents: Read) under this repo's Settings → Secrets and variables → Actions."
          exit 1

      - name: Checkout arcflow-core (engine source)
        uses: actions/checkout@v4
        with:
          repository: ozinc/arcflow-core
          path: arcflow-core
          token: ${{ secrets.ARCFLOW_CORE_RO_PAT }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU (for aarch64 cross-build on Linux)
        if: contains(matrix.platform, 'aarch64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build engine cdylib
        working-directory: arcflow-core
        run: cargo build --release -p wc-ffi

      - name: Stage native lib + build wheel
        working-directory: arcflow-core/python
        run: |
          mkdir -p src/arcflow/_native
          case "$(uname -s)" in
            Darwin) cp ../target/release/libarcflow.dylib src/arcflow/_native/ ;;
            Linux)  cp ../target/release/libarcflow.so   src/arcflow/_native/ ;;
          esac
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Verify wheel installs and imports
        working-directory: arcflow-core/python
        run: |
          python -m venv .verify
          .verify/bin/pip install dist/*.whl
          .verify/bin/python -c "
          from arcflow import ArcFlow, __version__
          print('version', __version__)
          db = ArcFlow()
          db.execute(\"CREATE (n:Hello {ok: 1})\")
          for row in db.execute(\"MATCH (n:Hello) RETURN n.ok\"):
              print(row)
          db.close()
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: arcflow-core/python/dist/*.whl

  publish:
    name: Publish to PyPI (OIDC)
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/oz-arcflow/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inspect dist/
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

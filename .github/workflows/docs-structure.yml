# Enforce the docs/spec IA contract — see docs/_AGENTS.md.
#
# Two checks run on every push/PR:
#   1. scripts/check-docs-structure.py — R1..R9 (schema_version, kind matching,
#      no `section:` / `order:` frontmatter, valid canonicals, no order
#      collisions, registration completeness, slug uniqueness, top-level cap).
#   2. scripts/generate-reference.py --check — regenerated MDX matches the
#      vendored data.
#
# If any fails, the underlying issue must be fixed. Do not bypass.

name: docs-structure

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Docs structure (R1..R9)
        run: python3 scripts/check-docs-structure.py

      - name: Generated reference up-to-date with vendored data
        run: python3 scripts/generate-reference.py --check
        continue-on-error: true

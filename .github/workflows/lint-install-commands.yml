# PAT-0043 enforcement — no hand-rolled install commands in customer surfaces.
#
# Runs on every push and PR. Greps docs/, install/README.md, llms*.txt for
# forbidden patterns (pip install arcflow, npm install arcflow, cargo add
# arcflow, ghcr.io/.../arcflow, /install_arcflow). Fails closed.
#
# Soft allowlist is in scripts/lint-install-commands.py; entries must include
# a justification. New soft-allowlisted files require PR review of the
# justification.

name: lint-install-commands

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lint
        run: python3 scripts/lint-install-commands.py

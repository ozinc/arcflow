name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.6.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Binaries are built in arcflow-core CI and uploaded as artifacts.
      # This workflow downloads them and attaches to a GitHub Release.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ArcFlow v${{ inputs.version }}
          generate_release_notes: true
          files: |
            artifacts/arcflow-*
            artifacts/SHA256SUMS
          body: |
            ## Install

            ```bash
            curl -fsSL https://github.com/ozinc/arcflow/releases/latest/download/install.sh | sh
            ```

            ```bash
            npm install arcflow
            ```

            ```bash
            docker run ghcr.io/ozinc/arcflow:${{ inputs.version }}
            ```

            ## Assets

            | Platform | Asset |
            |---|---|
            | macOS (Apple Silicon) | `arcflow-${{ inputs.version }}-darwin-arm64.tar.gz` |
            | macOS (Intel) | `arcflow-${{ inputs.version }}-darwin-x64.tar.gz` |
            | Linux (x64) | `arcflow-${{ inputs.version }}-linux-x64-gnu.tar.gz` |
            | Linux (ARM64) | `arcflow-${{ inputs.version }}-linux-arm64-gnu.tar.gz` |

      - name: Upload install script
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: install/install.sh

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: cd typescript && npm ci && npm run build
      - run: cd typescript && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          echo "Docker build configured when Dockerfile is added"

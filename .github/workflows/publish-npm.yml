# Public npm publish for the ArcFlow JS package.
#
# This workflow lives in ozinc/arcflow (public) for supply-chain audit
# transparency. The TypeScript package source lives in this repo
# (typescript/). The napi-rs Rust binding source is checked out from
# ozinc/arcflow-core (private) via ARCFLOW_CORE_RO_PAT during the run.
#
# npm package name:  @ozinc/arcflow  (scoped, set in typescript/package.json)
#
# Operator setup (one-time):
#   1. npm Trusted Publisher: register at npmjs.com → account settings →
#      Publishing access → Add pending trusted publisher (since the package
#      doesn't exist yet on npm). Form fields:
#        Provider:               GitHub Actions
#        Organization or user:   ozinc
#        Repository:             arcflow
#        Workflow filename:      publish-npm.yml
#        Environment:            npm-publish
#      Note: the per-package settings page at npmjs.com/package/@ozinc/arcflow/access
#      will become the editable home for this trust relationship after the
#      first successful publish.
#   2. Provision ARCFLOW_CORE_RO_PAT (same secret as publish-python.yml).
#   3. The `npm-publish` GitHub Environment exists in this repo.
#
# Trigger: GitHub release published. Re-run via workflow_dispatch.
#
# DO NOT rename this file or the `npm-publish` environment without first
# updating the npm Trusted Publisher entry. Renames break the OIDC match
# silently with `invalid-publisher`.

name: publish-npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-natives:
    name: Build napi-rs prebuild — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      target: aarch64-apple-darwin,      napi: "darwin-arm64" }
          - { os: macos-13,      target: x86_64-apple-darwin,       napi: "darwin-x64" }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  napi: "linux-x64-gnu" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, napi: "linux-arm64-gnu" }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, napi: "linux-x64-musl" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, napi: "linux-arm64-musl" }
    steps:
      - name: Verify ARCFLOW_CORE_RO_PAT is set
        if: ${{ secrets.ARCFLOW_CORE_RO_PAT == '' }}
        run: |
          echo "::error::ARCFLOW_CORE_RO_PAT is not set. Provision a fine-grained PAT scoped to ozinc/arcflow-core (Contents: Read) under this repo's Settings → Secrets and variables → Actions."
          exit 1

      - name: Checkout arcflow-core (engine + napi-rs source)
        uses: actions/checkout@v4
        with:
          repository: ozinc/arcflow-core
          path: arcflow-core
          token: ${{ secrets.ARCFLOW_CORE_RO_PAT }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade npm to a version with OIDC support
        run: npm install -g npm@latest

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build napi-rs binding
        working-directory: arcflow-core/bindings/typescript
        run: |
          npm install
          napi build --release --target ${{ matrix.target }} --platform

      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.napi }}
          path: arcflow-core/bindings/typescript/*.node

  publish:
    name: Publish to npm (OIDC)
    needs: build-natives
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@ozinc/arcflow
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: natives
          pattern: napi-*

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to a version with OIDC support
        run: npm install -g npm@latest

      - name: Stage native artifacts under typescript/npm/
        run: |
          cd typescript
          mkdir -p npm
          ls ../natives/

      - name: Publish to npm
        working-directory: typescript
        run: |
          npm install
          npm run build
          npm publish --access public --provenance

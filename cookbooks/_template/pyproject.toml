[project]
name = "arcflow-cookbook-template"
version = "0.0.0"
requires-python = ">=3.10"
dependencies = [
    "oz-arcflow==1.6.6",
]

[tool.uv.sources]
# During alpha (status=planned in release-matrix.json), pin the local wheel.
